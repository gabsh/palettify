apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: palettify-ingress
  namespace: palettify
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - palettify.app
        - api.palettify.app
      secretName: palettify-tls
  rules:
    - host: palettify.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: api.palettify.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080